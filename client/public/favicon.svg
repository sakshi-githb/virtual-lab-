<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Orbit 1 (Slanted) -->
  <ellipse cx="50" cy="50" rx="42" ry="15" fill="none" stroke="#3B82F6" stroke-width="5" transform="rotate(30 50 50)" />
  
  <!-- Orbit 2 (Slanted Opposed) -->
  <ellipse cx="50" cy="50" rx="42" ry="15" fill="none" stroke="#10B981" stroke-width="5" transform="rotate(-30 50 50)" />
  
  <!-- Nucleus / Center -->
  <circle cx="50" cy="50" r="14" fill="#FACC15" stroke="#1A1A1A" stroke-width="6" />
  
  <!-- Electron 1 -->
  <circle cx="22" cy="34" r="6" fill="#EF4444" stroke="#1A1A1A" stroke-width="2" />
  
  <!-- Electron 2 -->
  <circle cx="78" cy="34" r="6" fill="#3B82F6" stroke="#1A1A1A" stroke-width="2" />
</svg>